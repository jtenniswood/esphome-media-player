                        pad_right: 20
                        pad_top: 20
                        pad_bottom: 20
                        scrollable: false
                        layout:
                          type: flex
                          flex_flow: COLUMN
                          flex_align_main: space_between
                          flex_align_cross: start
                        widgets:
                          - obj:
                              width: 160
                              height: SIZE_CONTENT
                              bg_opa: 0%
                              border_width: 0
                              pad_all: 0
