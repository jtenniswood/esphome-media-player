name: Publish Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/publish-pages.yml"
  workflow_run:
    workflows: [Publish Firmware]
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - run: npm ci
      - run: npm run docs:build
      - run: mkdir -p docs/.vitepress/dist/firmware
      - uses: robinraju/release-downloader@v1
        with:
          latest: true
          fileName: "*"
          out-file-path: docs/.vitepress/dist/firmware
        continue-on-error: true
      - name: Rename firmware files to device-specific names
        run: |
          FW="docs/.vitepress/dist/firmware"
          for suffix in factory.bin ota.bin; do
            OLD="${FW}/media-player-esp32s3.${suffix}"
            NEW="${FW}/media-player-4848s040.${suffix}"
            if [ -f "$OLD" ]; then
              mv "$OLD" "$NEW" && echo "Renamed $(basename "$OLD") -> $(basename "$NEW")"
            fi
          done
      - name: Add ESP32-P4 builds to manifest
        run: |
          FW="docs/.vitepress/dist/firmware"
          MANIFEST="${FW}/media-player.manifest.json"

          if [ ! -f "$MANIFEST" ]; then
            echo "Manifest not found; skipping P4 builds."
            exit 0
          fi

          add_p4_build() {
            local slug="$1"
            local factory="${FW}/media-player-${slug}.factory.bin"
            local ota="${FW}/media-player-${slug}.ota.bin"

            if [ ! -f "$factory" ]; then
              echo "P4 factory binary for ${slug} not found; skipping."
              return
            fi

            local factory_md5 factory_sha256
            factory_md5=$(md5sum "$factory" | awk '{print $1}')
            factory_sha256=$(sha256sum "$factory" | awk '{print $1}')

            local p4_build
            p4_build=$(jq -n \
              --arg path "media-player-${slug}.factory.bin" \
              --arg fm "$factory_md5" \
              --arg fs "$factory_sha256" \
              '{
                chipFamily: "ESP32-P4",
                parts: [{
                  path: $path,
                  offset: 0,
                  md5: $fm,
                  sha256: $fs
                }]
              }')

            if [ -f "$ota" ]; then
              local ota_md5 ota_sha256 summary release_url
              ota_md5=$(md5sum "$ota" | awk '{print $1}')
              ota_sha256=$(sha256sum "$ota" | awk '{print $1}')
              summary=$(jq -r '.builds[0].ota.summary // empty' "$MANIFEST")
              release_url=$(jq -r '.builds[0].ota.release_url // empty' "$MANIFEST")
              p4_build=$(echo "$p4_build" | jq \
                --arg path "media-player-${slug}.ota.bin" \
                --arg om "$ota_md5" \
                --arg os "$ota_sha256" \
                --arg summary "$summary" \
                --arg url "$release_url" \
                '. + {ota: {path: $path, md5: $om, sha256: $os, summary: $summary, release_url: $url}}')
            fi

            jq --argjson p4 "$p4_build" '.builds += [$p4]' "$MANIFEST" > "${MANIFEST}.tmp"
            mv "${MANIFEST}.tmp" "$MANIFEST"
            echo "ESP32-P4 build added to manifest for ${slug}."
          }

          add_p4_build "jc8012p4a1"
          add_p4_build "jc4880p443"
          add_p4_build "p4-86-panel"
      - name: Rename S3 paths in combined manifest
        run: |
          FW="docs/.vitepress/dist/firmware"
          MANIFEST="${FW}/media-player.manifest.json"

          if [ ! -f "$MANIFEST" ]; then
            echo "Combined manifest not found; skipping S3 path rename."
            exit 0
          fi

          jq '(.builds[] | select(.chipFamily == "ESP32-S3") | .parts[].path) |= gsub("media-player-esp32s3"; "media-player-4848s040")
            | (.builds[] | select(.chipFamily == "ESP32-S3") | .ota.path) |= if . then gsub("media-player-esp32s3"; "media-player-4848s040") else . end' \
            "$MANIFEST" > "${MANIFEST}.tmp"
          mv "${MANIFEST}.tmp" "$MANIFEST"
          echo "S3 paths renamed to device-specific names in combined manifest."
      - name: Generate per-device manifests
        run: |
          FW="docs/.vitepress/dist/firmware"
          MANIFEST="${FW}/media-player.manifest.json"

          if [ ! -f "$MANIFEST" ]; then
            echo "Combined manifest not found; skipping per-device manifests."
            exit 0
          fi

          # S3 device manifest (4848S040) — extract the ESP32-S3 build entry
          jq '{name: .name, version: .version, home_assistant_domain: .home_assistant_domain, new_install_prompt_erase: .new_install_prompt_erase, builds: [.builds[] | select(.chipFamily == "ESP32-S3")]}' \
            "$MANIFEST" > "${FW}/media-player-4848s040.manifest.json"
          echo "Created media-player-4848s040.manifest.json"
          mkdir -p "${FW}/4848s040"
          cp "${FW}/media-player-4848s040.manifest.json" "${FW}/4848s040/manifest.json"
          cp "${FW}/media-player-4848s040.factory.bin" "${FW}/4848s040/" 2>/dev/null || true
          cp "${FW}/media-player-4848s040.ota.bin" "${FW}/4848s040/" 2>/dev/null || true
          echo "Created firmware/4848s040/manifest.json"

          # P4 device manifest (JC8012P4A1) — extract the matching ESP32-P4 build entry
          jq '{name: .name, version: .version, home_assistant_domain: .home_assistant_domain, new_install_prompt_erase: .new_install_prompt_erase, builds: [.builds[] | select(any(.parts[]; .path == "media-player-jc8012p4a1.factory.bin"))]}' \
            "$MANIFEST" > "${FW}/media-player-jc8012p4a1.manifest.json"
          echo "Created media-player-jc8012p4a1.manifest.json"
          mkdir -p "${FW}/jc8012p4a1"
          cp "${FW}/media-player-jc8012p4a1.manifest.json" "${FW}/jc8012p4a1/manifest.json"
          cp "${FW}/media-player-jc8012p4a1.factory.bin" "${FW}/jc8012p4a1/" 2>/dev/null || true
          cp "${FW}/media-player-jc8012p4a1.ota.bin" "${FW}/jc8012p4a1/" 2>/dev/null || true
          echo "Created firmware/jc8012p4a1/manifest.json"

          # P4 device manifest (JC4880P443) — extract the matching ESP32-P4 build entry
          jq '{name: .name, version: .version, home_assistant_domain: .home_assistant_domain, new_install_prompt_erase: .new_install_prompt_erase, builds: [.builds[] | select(any(.parts[]; .path == "media-player-jc4880p443.factory.bin"))]}' \
            "$MANIFEST" > "${FW}/media-player-jc4880p443.manifest.json"
          echo "Created media-player-jc4880p443.manifest.json"
          mkdir -p "${FW}/jc4880p443"
          cp "${FW}/media-player-jc4880p443.manifest.json" "${FW}/jc4880p443/manifest.json"
          cp "${FW}/media-player-jc4880p443.factory.bin" "${FW}/jc4880p443/" 2>/dev/null || true
          cp "${FW}/media-player-jc4880p443.ota.bin" "${FW}/jc4880p443/" 2>/dev/null || true
          echo "Created firmware/jc4880p443/manifest.json"

          # P4 device manifest (Waveshare 86 Panel) — extract the matching ESP32-P4 build entry
          jq '{name: .name, version: .version, home_assistant_domain: .home_assistant_domain, new_install_prompt_erase: .new_install_prompt_erase, builds: [.builds[] | select(any(.parts[]; .path == "media-player-p4-86-panel.factory.bin"))]}' \
            "$MANIFEST" > "${FW}/media-player-p4-86-panel.manifest.json"
          echo "Created media-player-p4-86-panel.manifest.json"
          mkdir -p "${FW}/p4-86-panel"
          cp "${FW}/media-player-p4-86-panel.manifest.json" "${FW}/p4-86-panel/manifest.json"
          cp "${FW}/media-player-p4-86-panel.factory.bin" "${FW}/p4-86-panel/" 2>/dev/null || true
          cp "${FW}/media-player-p4-86-panel.ota.bin" "${FW}/p4-86-panel/" 2>/dev/null || true
          echo "Created firmware/p4-86-panel/manifest.json"
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/.vitepress/dist
          retention-days: 1

  publish:
    if: github.event_name != 'pull_request'
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v6
      - id: deployment
        uses: actions/deploy-pages@v5
