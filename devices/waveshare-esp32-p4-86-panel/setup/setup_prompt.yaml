# =============================================================================
# SETUP PROMPT (no media player entity configured)
# =============================================================================
# Shown by subscribe_media_player when entity is empty.
# Placed after controls so it covers them.
# =============================================================================

obj:
  id: setup_prompt
  x: 0
  y: 0
  width: 720
  height: 720
  bg_color: 0x000000
  bg_opa: 100%
  radius: 0
  border_width: 0
  pad_left: 45
  pad_right: 45
  scrollable: false
  scrollbar_mode: "off"
  hidden: true
  layout:
    type: flex
    flex_flow: COLUMN
    flex_align_main: center
    flex_align_cross: center
    pad_row: 24
  widgets:
    - label:
        text_font: $icon_font
        text: $icon_cast
        text_color: 0xFFFFFF
    - label:
        text: "Media Player"
        text_font: roboto_light40_font
        text_color: 0xFFFFFF
        width: 630
        text_align: center
    - label:
        text: "Set the media player entity\nyou want to control in\ndevice settings"
        text_font: roboto30_font
        text_color: 0x888888
        width: 630
        text_align: center
        pad_top: 12