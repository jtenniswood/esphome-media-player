substitutions:
  media_player: ""
  linked_media_player: ""
  ha_port: "8123"
  ha_host: "homeassistant.local"
  ha_protocol: "http"
  ha_verify_ssl: "true"
  # Display rotation in degrees: 0, 90, 180, or 270
  # Rotate to match your preferred mounting orientation / power cable direction
  display_rotation: "0"

  # -- Common config (consumed by common/ files) --
  artwork_size: "720"
  artwork_display_size: "720"
  image_byte_order: "little_endian"
  artwork_image_buffer_size: "65536"
  clock_cx: "360"
  clock_cy: "360"
  rgb565_read_expr: "data[pos] | (data[pos + 1] << 8)"
  device_slug: "esp32-p4-86-panel"
  firmware_manifest_slug: "p4-86-panel"
  post_artwork_script: "apply_warm_tones"
  warm_tone_post_script: "start_hide_track_info_timer"
  warm_tone_red_boost: "0.11f"
  warm_tone_green_reduce: "0.22f"
  warm_tone_blue_reduce: "0.28f"
  artwork_contrast_boost: "0.04f"
  artwork_saturation_boost: "0.10f"
  track_info_duration_default: "5"
  pause_lvgl_on_screen_off: "true"
  clock_screensaver_supported: "true"

packages:
  # Common
  time_sync: !include ../../common/addon/time.yaml
  timezone: !include ../../common/addon/timezone.yaml
  music: !include ../../common/addon/music.yaml
  backlight: !include ../../common/addon/backlight.yaml
  network: !include ../../common/addon/network.yaml
  speaker_group: !include ../../common/addon/speaker_group.yaml
  accent_color: !include ../../common/addon/accent_color.yaml
  warm_tones: !include ../../common/addon/warm_tones.yaml
  firmware_update: !include ../../common/addon/firmware_update.yaml
  sensors: !include ../../common/device/sensors.yaml
  media_player_select: !include ../../common/device/media_player_select.yaml
  linked_sensors: !include ../../common/device/linked_sensors.yaml

  # Device-specific
  device: !include device/device.yaml
  lvgl: !include device/lvgl.yaml
  fonts: !include assets/fonts.yaml
  icons: !include assets/icons.yaml
  button: !include theme/button.yaml
