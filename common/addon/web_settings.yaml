# =============================================================================
# WEB SETTINGS UI - ESP32-P4 only
# =============================================================================
# Serves the browser-based settings interface used by the P4 devices. The S3
# device deliberately does not include this package to keep its firmware smaller.
# =============================================================================

json:

web_server:
  port: 80
  version: 3
  include_internal: true
  js_url: "https://jtenniswood.github.io/esphome-media-player/webserver/app.js"
  sorting_groups:
    - id: sg_setup
      name: "Setup"
      sorting_weight: 10
    - id: sg_playback
      name: "Playback"
      sorting_weight: 20
    - id: sg_screen
      name: "Screen"
      sorting_weight: 30
    - id: sg_clock
      name: "Clock"
      sorting_weight: 40
    - id: sg_firmware
      name: "Firmware"
      sorting_weight: 50
    - id: sg_device
      name: "Device"
      sorting_weight: 60
